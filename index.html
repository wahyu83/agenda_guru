<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#2b3e50" />
    <meta name="description" content="Aplikasi manajemen agenda dan absensi untuk guru" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <title>Agenda guru SMKN 1 Arahan</title>

  </head>
  <body>
    <div id="root">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #F8FAFC; font-family: 'Inter', sans-serif;">
        <img src="/icon.png" alt="Agenda Guru Logo" style="width: 120px; height: 120px; border-radius: 24px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); margin-bottom: 24px; animation: pulse 2s infinite;" />
        <h1 style="color: #4F46E5; font-size: 1.5rem; margin-bottom: 8px; text-align: center; line-height: 1.2;">
          Agenda Guru <br />
          <span style="font-size: 1rem; font-weight: 500; color: #4F46E5;">SMKN 1 Arahan</span>
        </h1>


        <p style="color: #64748B; font-size: 0.875rem;">Memuat aplikasi...</p>
        <style>
          @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.95); opacity: 0.8; }
          }
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
